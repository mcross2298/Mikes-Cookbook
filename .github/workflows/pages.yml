name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: JS syntax check (node --check)
        run: |
          fail=0
          for f in $(git ls-files '*.js'); do
            node --check "$f" || { echo "::error file=$f::JavaScript syntax error"; fail=1; }
          done
          exit $fail
      - name: Validate recipes-data.js
        run: node tools/validate-recipes.js
      - name: Cross-app bridge regression tests (mc-bridge.js read layer + mc-sync.js merge logic)
        run: |
          node tools/test-mc-bridge.js
          node tools/test-mc-sync-merge.js
      - name: Service-worker strategy test (stale-while-revalidate — audit LS-4)
        run: node tools/test-sw-strategy.js
      - name: Shared-module drift check (this repo's copies vs 4-Weeks-to-Open- canonical — audit LS-1)
        # Downloads the canonical shared modules (and the checker itself) from
        # the workout repo and fails if any local copy drifted. Never hand-edit
        # the tracker-*.js / mc-bridge.js / mc-install.js / mc-backup-status.js
        # copies here — fix upstream and re-run tools/sync-shared-modules.py.
        run: |
          mkdir -p /tmp/canonical/tools
          base="https://raw.githubusercontent.com/mcross2298/4-Weeks-to-Open-/main"
          for f in mc-foodapi.js mc-macrocalc.js mc-barcode.js \
                   mc-bridge.js mc-install.js mc-backup-status.js \
                   tools/test-mc-bridge.js tools/sync-shared-modules.py; do
            curl -fsSL --retry 3 "$base/$f" -o "/tmp/canonical/$f"
          done
          python3 /tmp/canonical/tools/sync-shared-modules.py --check --root /tmp/canonical --cookbook-dir .
      - name: Regenerate service worker (auto version + precache list)
        run: python3 tools/build-sw.py --version "ci-${{ github.run_number }}"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
