name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: JS syntax check (node --check)
        run: |
          fail=0
          for f in $(git ls-files '*.js'); do
            node --check "$f" || { echo "::error file=$f::JavaScript syntax error"; fail=1; }
          done
          exit $fail
      - name: Validate recipes-data.js
        run: node tools/validate-recipes.js
      - name: Cross-app bridge regression tests (mc-bridge.js read layer + mc-sync.js merge logic)
        run: |
          node tools/test-mc-bridge.js
          node tools/test-mc-sync-merge.js
      - name: Regenerate service worker (auto version + precache list)
        run: python3 tools/build-sw.py --version "ci-${{ github.run_number }}"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
