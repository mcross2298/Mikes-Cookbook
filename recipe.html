<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1E2022" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Recipe · Mike's Cookbook</title>
  <link rel="stylesheet" href="cookbook.css" />
</head>
<body>
  <main class="app" data-tabbar="page">
    <!-- Fixed header summary: title, tags, times, serving-size ladder -->
    <header class="r-header" id="header"></header>

    <!-- Sticky, swipeable sub-tab bar -->
    <nav class="subtabs">
      <button type="button" class="subtab active" id="tab-overview">Overview &amp; Macros</button>
      <button type="button" class="subtab" id="tab-grocery">Grocery</button>
      <button type="button" class="subtab" id="tab-recipe">Recipe</button>
    </nav>

    <!-- Tab content -->
    <section class="panes" id="panes">
      <div class="pane active" id="pane-overview"></div>
      <div class="pane" id="pane-grocery"></div>
      <div class="pane" id="pane-recipe"></div>
    </section>
  </main>

  <script src="recipes-data.js"></script>
  <script src="user-recipes.js"></script>
  <script src="cookbook-nav.js"></script>
  <script src="cookbook.js"></script>
  <script src="tracker-store.js"></script>
  <script src="tracker-recipe.js"></script>
  <script src="cookbook-sw.js"></script>
</body>
</html>
