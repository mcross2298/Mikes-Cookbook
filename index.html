<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1E2022" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mike's Cookbook" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Mike's Cookbook</title>
  <link rel="stylesheet" href="cookbook.css" />
</head>
<body>
  <main class="app shell" data-tabbar="shell">
    <!-- Screens swap like 4WTO's dashboard; only .active is shown. -->
    <section class="screen active" id="screen-home"></section>
    <section class="screen" id="screen-recipes"></section>
    <section class="screen" id="screen-favorites"></section>

    <!-- Bottom tab bar is rendered by cookbook-nav.js (one shared bar
         across index / recipe / collection). -->
  </main>

  <script src="recipes-data.js"></script>
  <script src="cookbook-nav.js"></script>
  <script src="cookbook-home.js"></script>
  <script src="cookbook-sw.js"></script>
</body>
</html>
